services:
  onlyoffice:
    image: ${ONLYOFFICE_IMAGE:?Variable is not set}
    restart: unless-stopped
    container_name: onlyoffice
    environment:
      - DB_TYPE=mariadb
      - DB_HOST=${MARIA_DB_HOST:?Variable is not set}
      - DB_PORT=${MARIA_DB_PORT:?Variable is not set}
      - DB_USER=${ONLYOFFICE_DB_USER:?Variable is not set or empty}
      - DB_PWD=${ONLYOFFICE_DB_PASSWORD:?Variable is not set or empty}
      - DB_NAME=${ONLYOFFICE_DB_NAME:?Variable is not set}
      - WOPI_ENABLED=true
      - JWT_ENABLED=true
      - JWT_SECRET=${JWT_PRIVATE_KEY}
      - ALLOW_META_IP_ADDRESS=true
      - ALLOW_PRIVATE_IP_ADDRESS=true
      # - USE_UNAUTHORIZED_STORAGE=true
      # - AMQP_URI=amqp://guest:guest@rabbitmq
    stdin_open: true
    stop_grace_period: 60s
    volumes:
      - ${BASE_STORAGE_DIR:-/blk}/onlyoffice/logs:/var/log/onlyoffice
      - ${BASE_STORAGE_DIR:-/blk}/onlyoffice/data:/var/www/onlyoffice/Data
      - ${BASE_STORAGE_DIR:-/blk}/onlyoffice/lib:/var/lib/onlyoffice
      - ${BASE_STORAGE_DIR:-/blk}/onlyoffice/examples:/var/www/onlyoffice/documentserver-example/public/files
      - ${BASE_STORAGE_DIR:-/blk}/onlyoffice/fonts:/usr/share/fonts
      - ${BASE_STORAGE_DIR:-/blk}/onlyoffice/caches:/var/lib/onlyoffice/documentserver/App_Data/cache/files
    labels:
      caddy: ${SERVER_PROTOCOL:-http}://${ONLYOFFICE_SERVER_HOSTNAME:?Variable is not set or empty}
      caddy.reverse_proxy: "{{upstreams 80}}"
    depends_on:
      mariadb:
        condition: service_healthy
      # rabbitmq:
      #   condition: service_started
    networks:
      - docker_net

networks:
  docker_net:
    external: true
