services:
  seadoc:
    image: ${SEADOC_IMAGE:?Variable is not set}
    container_name: seadoc
    restart: unless-stopped
    volumes:
      - ${BASE_STORAGE_DIR:?Variable is not set}/seadoc:/shared
    environment:
      - DB_HOST=${MARIA_DB_HOST:?Variable is not set}
      - DB_PORT=${MARIA_DB_PORT:?Variable is not set}
      - DB_USER=${SEAFILE_DB_USER:?Variable is not set}
      - DB_PASSWORD=${SEAFILE_DB_PASSWORD:?Variable is not set or empty}
      - DB_NAME=${SEAFILE_SEAHUB_DB_NAME:?Variable is not set}}
      - TIME_ZONE=${TIME_ZONE:?Variable is not set}
      - JWT_PRIVATE_KEY=${JWT_PRIVATE_KEY:?Variable is not set or empty}
      - NON_ROOT=${NON_ROOT:-false}
      - SEAHUB_SERVICE_URL=${SERVER_PROTOCOL:?Variable is not set}://${SEAFILE_SERVER_HOSTNAME:?Variable is not set}
    labels:
      caddy: ${SERVER_PROTOCOL:-http}://${SEAFILE_SERVER_HOSTNAME:?Variable is not set or empty}
      caddy.@ws.0_header: "Connection *Upgrade*"
      caddy.@ws.1_header: "Upgrade websocket"
      caddy.0_reverse_proxy: "@ws {{upstreams 80}}"
      caddy.1_handle_path: "/socket.io/*"
      caddy.1_handle_path.0_rewrite: "* /socket.io{uri}"
      caddy.1_handle_path.1_reverse_proxy: "{{upstreams 80}}"
      caddy.2_handle_path: "/sdoc-server/*"
      caddy.2_handle_path.0_rewrite: "* {uri}"
      caddy.2_handle_path.1_reverse_proxy: "{{upstreams 80}}"
    depends_on:
      mariadb:
        condition: service_started
    networks:
      - docker_net

networks:
  docker_net:
    external: true
