services:
  postgres:
    image: ${POSTGRES_IMAGE:?Variable is not set}
    container_name: postgres
    # user: ${UID:-0}:${GID:-0}
    restart: unless-stopped
    shm_size: 128mb
    # ports:
    #  - 5432:5432
    environment:
      - POSTGRES_USER=${POSTGRES_USER:?Variable is not set}
      - POSTGRES_PASSWORD=${POSTGRES_PASSWORD:?Variable is not set}
      - POSTGRES_DB=${POSTGRES_DB:?Variable is not set}
    volumes:
      - ${BASE_STORAGE_DIR:?Variable is not set}/postgres:/var/lib/postgresql/data
      - ${BASE_STORAGE_DIR:?Variable is not set}/init/postgres:/docker-entrypoint-initdb.d
    networks:
      - docker_net

networks:
  docker_net:
    external: true
